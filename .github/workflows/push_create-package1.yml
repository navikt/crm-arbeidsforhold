name: "Create Package"
on:
  workflow_dispatch:
    inputs:
      create-alpha-package:
        description: "Create alpha package (skip code coverage validation)"
        type: boolean
        default: false
      installation-key-bypass:
        description: "Bypass the installation key for the package"
        type: boolean
        default: false
      scratch-org-def-file:
        description: "Path to scratch org definition file"
        type: string
        default: config/project-scratch-def.json
      metadata-path:
        description: "Path to metadata to deploy after package install"
        type: string
        default: ./force-app/unpackagable-with-auto-deploy
      version-description:
        description: "Description for the package version"
        type: string
      wait:
        description: "Wait time for package creation (minutes)"
        type: number
        default: 120
      SFDX_ENV:
        description: "Environment variables to be set for sf commands"
        type: string
  workflow_call:
    inputs:
      create-alpha-package: { type: boolean, default: false }
      installation-key-bypass: { type: boolean, default: false }
      scratch-org-def-file: { type: string, default: config/project-scratch-def.json }
      metadata-path: { type: string, default: ./force-app/unpackagable-with-auto-deploy }
      version-description: { type: string }
      wait: { type: number, default: 120 }
      SFDX_ENV: { type: string }
    outputs:
      packageId:
        description: "The created package version Id (04t...)"
        value: ${{ jobs.create-package.outputs.packageId }}

concurrency:
  group: create-package-version-${{ github.ref_name }}
  cancel-in-progress: false

permissions: {}

jobs:
  create-package:
    name: Create Package
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions: { contents: write }
    outputs:
      packageId: ${{ steps.create.outputs.packageId }}
      versionNumber: ${{ steps.create.outputs.versionNumber }}
      codeCoverage: ${{ steps.create.outputs.codeCoverage }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # default; explicit for clarity
          persist-credentials: true
      - uses: navikt/crm-workflows-base/.github/actions/installSF@master
      - uses: navikt/crm-workflows-base/.github/actions/authenticateOrg@master
        with:
          auth-url: ${{ secrets.CRM_PROD_SFDX_URL }}
          alias: prod
          setDefaultUsername: true
          setDefaultDevhubUsername: true

      - name: Auto-bump versionNumber above latest released
        run: |
          set -euo pipefail

          PKG=$(jq -r '[.packageDirectories[]? | select(.package) | .package][0] // empty' sfdx-project.json)
          [[ -z "$PKG" ]] && { echo "::error::No package found in sfdx-project.json"; exit 1; }

          LOCAL=$(jq -r '[.packageDirectories[]? | select(.package) | .versionNumber][0]' sfdx-project.json)
          IFS='.' read -r lM lm lp lb <<< "$LOCAL"
          echo "Local versionNumber: $LOCAL"

          RELEASED=$(sf package version list --released --packages "$PKG" --target-dev-hub prod --json \
            | jq -r '[.result[]?.Version // empty]
                     | map(split(".") | map(tonumber))
                     | sort
                     | last
                     | if . == null then "0.0.0.0" else (map(tostring) | join(".")) end')
          echo "Latest released:    $RELEASED"

          IFS='.' read -r rM rm rp rb <<< "$RELEASED"

          needs_bump=false
          if   (( lM <  rM )); then needs_bump=true
          elif (( lM == rM && lm <  rm )); then needs_bump=true
          elif (( lM == rM && lm == rm && lp <= rp )); then needs_bump=true
          fi

          if [[ "$needs_bump" == "true" ]]; then
            newMinor=$(( rm + 1 ))
            NEW="${rM}.${newMinor}.0.NEXT"
            echo "::notice::Bumping versionNumber from $LOCAL to $NEW (released: $RELEASED)"
            tmp=$(mktemp)
            jq --arg new "$NEW" '
              .packageDirectories |= map(
                if .package then .versionNumber = $new else . end
              )
            ' sfdx-project.json > "$tmp" && mv "$tmp" sfdx-project.json
          else
            echo "versionNumber $LOCAL is already greater than released $RELEASED — no bump needed."
          fi

          jq '.packageDirectories' sfdx-project.json
      - name: Commit bumped versionNumber back to repo
        if: github.ref_name == (github.event.repository.default_branch || 'main')
        run: |
            set -euo pipefail
            if git diff --quiet -- sfdx-project.json; then
              echo "No change to sfdx-project.json — nothing to commit."
              exit 0
            fi
            NEW=$(jq -r '[.packageDirectories[]? | select(.package) | .versionNumber][0]' sfdx-project.json)
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sfdx-project.json
            git commit -m "chore: bump versionNumber to ${NEW} [skip ci]"
            # rebase-pull in case main moved while we were creating the package version
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Remove unpackagable metadata
        run: rm -rf ./force-app/unpackagable ./force-app/unpackagable-with-auto-deploy ./force-app/scratch-org

      - name: Create package version
        id: create
        env:
          DEF_FILE: ${{ inputs.scratch-org-def-file }}
          WAIT: ${{ inputs.wait || 120 }}
          ALPHA: ${{ inputs.create-alpha-package }}
          KEY_BYPASS: ${{ inputs.installation-key-bypass }}
          BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          DESC: ${{ inputs.version-description }}
          PACKAGE_KEY: ${{ secrets.CRM_PACKAGE_KEY }}
        run: |
          set -euo pipefail

          PKG=$(jq -r '[.packageDirectories[]? | select(.package) | .package][0] // empty' sfdx-project.json)
          [[ -z "$PKG" ]] && { echo "::error::No package found in sfdx-project.json"; exit 1; }

          args=(sf package version create --target-dev-hub prod --definition-file "$DEF_FILE" --package "$PKG" --wait "$WAIT" --json)
          [[ "$BRANCH" != "$DEFAULT_BRANCH" ]] && args+=(--branch "$BRANCH")
          [[ "$ALPHA" == "true" ]] && args+=(--skip-validation) || args+=(--code-coverage)
          [[ -n "${DESC:-}" ]] && args+=(--version-description "$DESC")

          if [[ "$KEY_BYPASS" == "true" ]]; then
            args+=(--installation-key-bypass)
          else
            [[ -z "${PACKAGE_KEY:-}" ]] && { echo "::error::CRM_PACKAGE_KEY secret is required"; exit 1; }
            args+=(--installation-key "$PACKAGE_KEY")
          fi

          echo "Creating package: $PKG"
          "${args[@]}" > result.json 2> warn.log || true

          STATUS=$(jq -r '.status' result.json)
          [[ "$STATUS" != "0" ]] && { echo "::error::$(jq -r '.message // "Unknown error"' result.json)"; cat result.json; exit 1; }

          packageId=$(jq -r '.result.SubscriberPackageVersionId' result.json)
          versionNumber=$(jq -r '.result.VersionNumber' result.json)
          [[ -z "$packageId" || "$packageId" == "null" ]] && { echo "::error::No packageId in result"; cat result.json; exit 1; }

          codeCoverage="N/A"
          if [[ "$ALPHA" != "true" ]]; then
            codeCoverage=$(jq -r 'if (.result.CodeCoverage | type) == "number" then .result.CodeCoverage else .result.CodeCoverage.apexCodeCoveragePercentage // 0 end' result.json)
          fi

          echo "packageId=$packageId" >> "$GITHUB_OUTPUT"
          echo "versionNumber=$versionNumber" >> "$GITHUB_OUTPUT"
          echo "codeCoverage=$codeCoverage" >> "$GITHUB_OUTPUT"
          echo "✅ $PKG $versionNumber ($packageId) coverage: $codeCoverage%"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package-create-diagnostics
          path: |
            result.json
            warn.log
          if-no-files-found: warn
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: create-package
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Generate changelog
        id: changelog
        continue-on-error: true
        uses: metcalfc/changelog-generator@v4.1.0
        with: { mytoken: "${{ secrets.GITHUB_TOKEN }}" }

      - name: Create release
        env:
          VERSION: ${{ needs.create-package.outputs.versionNumber }}
          PKG_ID: ${{ needs.create-package.outputs.packageId }}
          COVERAGE: ${{ needs.create-package.outputs.codeCoverage }}
          ALPHA: ${{ inputs.create-alpha-package }}
          BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          DESC: ${{ inputs.version-description }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS='.' read -r major minor patch build <<< "$VERSION"
          tag="beta"; [[ "$ALPHA" == "true" ]] && tag="alpha"
          name="${major}.${minor}.${patch}-${tag}.${build}"
          [[ "$BRANCH" != "$DEFAULT_BRANCH" ]] && name="${name}+${BRANCH}"

          body="${DESC:+$DESC\n\n}**Version**: $VERSION | **Package**: $PKG_ID | **Coverage**: ${COVERAGE}%
          ## Changelog
          ${CHANGELOG:-_No changelog_}"

          gh release create "v${name}" --title "$name" --notes "$body" --prerelease

  validate-in-sit:
    if: github.ref_name == (github.event.repository.default_branch || 'main')
    name: Validate in SIT
    needs: [create-package, create-release]
    permissions: { contents: read }
    uses: navikt/crm-workflows-base/.github/workflows/deployPackage.yml@master
    with:
      packageId: ${{ needs.create-package.outputs.packageId }}
      org: sit
      unpackagable: ${{ inputs.metadata-path }}
      SFDX_ENV: ${{ inputs.SFDX_ENV }}
    secrets: inherit
