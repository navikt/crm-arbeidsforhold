<template>
  <c-aareg_main-banner>Aa-registeret - Mine Avtaler</c-aareg_main-banner>
  <div class="container">
    <div class="inner-container">
      <div class="breadcrumbs">
        <c-breadcrumbs url-list={breadcrumbs}></c-breadcrumbs>
      </div>
      <div if:true={isMobile} style="height: 600px;">
        <lightning-datatable
          key-field="id"
          data={agreements}
          class="slds-max-medium-table_stacked"
          columns={columns}
          onrowaction={handleRowAction}
          hide-checkbox-column="true">
        </lightning-datatable>
      </div>
      <div if:false={isMobile}>
        <lightning-datatable
          key-field="id"
          data={agreements}
          columns={columns}
          onrowaction={handleRowAction}
          hide-checkbox-column="true">
        </lightning-datatable>
      </div>
      <div if:false={agreements} class="no-applications-container">
        <p>Du har ingen aktive avtaler.</p>
      </div>
    </div>
  </div>

  <!-- Modal: Avslutt avtale -->
<c-aareg_modal class="end-agreement-modal">
  <h2 class="slds-text-heading_medium slds-m-bottom_small">Avslutt avtale</h2>
  <p class="slds-m-bottom_medium">
    Er du sikker på at du vil avslutte avtale <strong>{selectedAgreement.avtaleNummer}</strong>?
    Handlingen kan ikke angres.
  </p>

  <div class="slds-grid slds-grid_align-end slds-gutters_x-small">
    <lightning-button
      class="slds-m-right_x-small"
      variant="neutral"
      label="Avbryt"
      onclick={closeEndAgreementModal}>
    </lightning-button>
    <lightning-button
      variant="destructive"
      label="Avslutt avtale"
      onclick={handleConfirmEndAgreement}>
    </lightning-button>
  </div>
</c-aareg_modal>
</template>
